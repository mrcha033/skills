name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          for skill in Path("skills").iterdir():
              text = (skill / "SKILL.md").read_text()
              assert text.startswith("---\n")
              assert f"name: {skill.name}\n" in text
          PY
      - name: Run deterministic calculator self-test
        run: python -B skills/quant-stock-technical/scripts/analyze_stock.py --self-test
      - name: Run mandatory handoff-gate self-test
        run: python -B skills/stock-scenario-story/scripts/validate_quant_handoff.py --self-test
      - name: Run numbers-free story gate self-test
        run: python -B skills/stock-scenario-story/scripts/validate_story_text.py --self-test
      - name: Run advisor context-packet self-test
        run: python -B skills/advisor-review/scripts/build_context_packet.py --self-test
      - name: Run advisor advice-schema self-test
        run: python -B skills/advisor-review/scripts/validate_advice.py --self-test
      - name: Run paired-skill integration test
        run: python -B tests/test_handoff_integration.py
      - name: Run advisor integration test
        run: python -B tests/test_advisor_review.py
      - name: Validate marketplace packaging
        run: python -B tests/test_marketplace_packaging.py
